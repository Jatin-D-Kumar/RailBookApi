# ===============================
# APPLICATION
# ===============================
spring.application.name=railbook-api

# ===============================
# DATABASE (ENV BASED)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/railbook}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIG (SECURE)
# ===============================
jwt.secret=${JWT_SECRET:change-this-to-a-very-secure-32+char-secret}
jwt.access.expiry=${JWT_ACCESS_EXPIRY:900000}       # 15 min
jwt.refresh.expiry=${JWT_REFRESH_EXPIRY:604800000}  # 7 days

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.railbook=DEBUG

# ===============================
# H2 CONSOLE (DEV ONLY)
# ===============================
spring.h2.console.enabled=${H2_ENABLED:false}
spring.h2.console.path=/h2-console

# ===============================
# DEVTOOLS (DEV ONLY)
# ===============================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false